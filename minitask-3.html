<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minitask 3</title>
<link rel="stylesheet" href="styles/minitask-3.css">
</head>

<body>

<main class="calculator">

    <div class="display">
        <div class="history">H</div>
        <div class="result">0</div>
    </div>

    <section class="buttons">

        <div class="scientific">
            <button>Deg</button>
            <button>Rad</button>
            <button>x!</button>

            <button>Inv</button>
            <button>sin</button>
            <button>ln</button>

            <button>π</button>
            <button>cos</button>
            <button>log</button>

            <button>e</button>
            <button>tan</button>
            <button>√</button>

            <button>Ans</button>
            <button>EXP</button>
            <button>X<sup>y</sup></button>
        </div>

        <div class="numeric">
            <button>(</button>
            <button>)</button>
            <button>%</button>

            <button>AC</button>

            <button class="number">7</button>
            <button class="number">8</button>
            <button class="number">9</button>
            <button>÷</button>

            <button class="number">4</button>
            <button class="number">5</button>
            <button class="number">6</button>
            <button>x</button>

            <button class="number">1</button>
            <button class="number">2</button>
            <button class="number">3</button>
            <button>-</button>

            <button class="number">0</button>
            <button class="number">.</button>
            <button class="equal">=</button>
            <button>+</button>

        </div>

    </section>

</main>

</body>
</html>
